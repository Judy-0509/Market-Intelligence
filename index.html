<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Market Intelligence</title>
  <meta name="description" content="Market Intelligence — 증권사 리서치 인사이트 포털">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231f9d57'/%3E%3Ctext x='16' y='22' font-family='serif' font-size='18' font-weight='800' fill='white' text-anchor='middle'%3EM%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..900&family=Noto+Sans+KR:wght@400;500;600;700;800;900&family=Noto+Serif+KR:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <!-- HEADER -->
  <div class="topbar">
    <header class="site-header">
      <div class="brand">
        <div class="brand__name">Market Intelligence</div>
        <div class="brand__tag">Insight for Smart Decisions</div>
      </div>
      <nav class="nav" id="nav" aria-label="주요 메뉴"></nav>
      <div class="header-actions">
        <div class="search">
          <input id="search" type="search" aria-label="검색" placeholder="검색어를 입력하세요" />
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="11" cy="11" r="7" stroke="#8a8a90" stroke-width="2"/><path d="M21 21l-4-4" stroke="#8a8a90" stroke-width="2" stroke-linecap="round"/></svg>
        </div>

        <div class="menu">
          <button type="button" id="bell-btn" class="icon-btn bell" aria-label="알림" aria-haspopup="menu" aria-expanded="false">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3a6 6 0 0 0-6 6v3.5L4.5 16h15L18 12.5V9a6 6 0 0 0-6-6Z" stroke="#3a3a3e" stroke-width="1.8" stroke-linejoin="round"/><path d="M9.5 19a2.5 2.5 0 0 0 5 0" stroke="#3a3a3e" stroke-width="1.8" stroke-linecap="round"/></svg>
            <span class="bell__badge" id="bell-badge">1</span>
          </button>
          <div class="dropdown" id="notif-menu" role="menu" aria-label="알림">
            <div class="dropdown__head">알림</div>
            <button type="button" class="notif" role="menuitem" data-detail="r1" data-listtype="report">
              <span class="notif__dot"></span>
              <span class="notif__body"><span class="notif__title">스마트폰 수요 회복 신호 리포트가 업데이트되었습니다</span><span class="notif__time">2시간 전</span></span>
            </button>
            <button type="button" class="notif" role="menuitem" data-detail="r3" data-listtype="report">
              <span class="notif__dot"></span>
              <span class="notif__body"><span class="notif__title">휴머노이드 로봇 양산 로드맵 점검 리포트가 등록되었습니다</span><span class="notif__time">5시간 전</span></span>
            </button>
            <button type="button" class="notif" role="menuitem" data-detail="r5" data-listtype="report">
              <span class="notif__dot"></span>
              <span class="notif__body"><span class="notif__title">자동차 수출 호조 지속 리포트가 등록되었습니다</span><span class="notif__time">1일 전</span></span>
            </button>
            <div class="dropdown__foot"><button type="button" class="dropdown__link" data-action="readall">모두 읽음으로 표시</button></div>
          </div>
        </div>

        <div class="menu">
          <button type="button" id="account-btn" class="icon-btn avatar" aria-label="내 계정" aria-haspopup="menu" aria-expanded="false">
            <span class="avatar__img"></span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 9l6 6 6-6" stroke="#9a9aa0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="dropdown dropdown--account" id="account-menu" role="menu" aria-label="계정 메뉴">
            <button type="button" class="menu-item" role="menuitem" data-action="profile">프로필</button>
            <button type="button" class="menu-item" role="menuitem" data-action="bookmarks">북마크한 리포트</button>
            <button type="button" class="menu-item" role="menuitem" data-action="settings">설정</button>
            <button type="button" class="menu-item menu-item--danger" role="menuitem" data-action="logout">로그아웃</button>
          </div>
        </div>
      </div>
    </header>
  </div>

  <div class="container">
    <!-- HOME VIEW -->
    <div id="home-view">
      <section class="hero" aria-label="오늘의 인사이트">
        <div class="hero__track" id="hero-track"></div>
        <div class="hero__dots" id="hero-dots" role="group" aria-label="히어로 슬라이드 선택"></div>
      </section>

      <div class="main-grid">
        <div>
          <div class="section-head">
            <h2>최신 리포트</h2>
            <div class="chips" id="home-chips" role="group" aria-label="응용처 필터"></div>
          </div>
          <div class="cards" id="cards"></div>
        </div>

        <aside class="sidebar">
          <div class="panel">
            <div class="panel__head">
              <h3>많이 본 리포트</h3>
              <button type="button" class="panel__more" aria-label="리포트 페이지로 이동">더보기
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M9 6l6 6-6 6" stroke="#8a8a90" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
            </div>
            <div id="ranking"></div>
          </div>
        </aside>
      </div>
    </div>

    <!-- REPORT VIEW -->
    <div id="report-view" class="hidden">
      <div class="report-page">
        <div class="report-head">
          <h1>리포트</h1>
          <p>응용처별 최신 리서치 리포트를 한눈에 확인하세요.</p>
        </div>
        <div class="report-chips" id="report-chips" role="group" aria-label="응용처 필터"></div>
        <div id="report-list"></div>
      </div>
    </div>
  </div>

  <div id="modal-root"></div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="./app.js"></script>
</body>
</html>
