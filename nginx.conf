# Market Intelligence — nginx config for static frontend hosting.
# Runs fully as a non-root user: pid/temp paths live under /tmp and the
# server listens on 8080 (no privileged port required).

worker_processes auto;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Keep all writable paths under /tmp so the container can run read-only / non-root.
  client_body_temp_path /tmp/client_temp;
  proxy_temp_path       /tmp/proxy_temp;
  fastcgi_temp_path     /tmp/fastcgi_temp;
  uwsgi_temp_path       /tmp/uwsgi_temp;
  scgi_temp_path        /tmp/scgi_temp;

  sendfile      on;
  tcp_nopush    on;
  server_tokens off;
  access_log    /dev/stdout;
  error_log     /dev/stderr warn;

  # --- gzip ---
  gzip              on;
  gzip_vary         on;
  gzip_min_length   1024;
  gzip_comp_level   6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    image/svg+xml;

  server {
    listen      8080;
    server_name _;
    root        /usr/share/nginx/html;
    index       index.html;

    charset utf-8;

    # Basic security headers (static site, no inline-eval needed).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options        SAMEORIGIN  always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;

    # Health check endpoint for orchestrators (k8s/compose/swarm).
    location = /healthz {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    # Long-cache static assets (immutable by content; bust via filename if needed).
    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|webp|ico|woff2?)$ {
      expires 7d;
      add_header Cache-Control "public, max-age=604800";
      try_files $uri =404;
    }

    # Single-page app: fall back to index.html for any unknown path.
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
